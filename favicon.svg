<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="white"/>
  <!-- Left bar: starts slightly lower -->
  <rect x="2"  y="5"  width="6" height="21" fill="#0d0d0d"/>
  <!-- Middle bar: tallest, starts from top -->
  <rect x="13" y="2"  width="6" height="23" fill="#0d0d0d"/>
  <!-- Right bar: starts lowest, extends furthest down -->
  <rect x="24" y="9"  width="6" height="21" fill="#0d0d0d"/>
</svg>
