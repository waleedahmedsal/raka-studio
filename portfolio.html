<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --black:#0d0d0d; --white:#ffffff; --mid:#888; --rule:#d0d0d0; }
body { font-family:'Epilogue',sans-serif; background:var(--white); color:var(--black); overflow-x:hidden; }

/* NAV */
#nav { position:fixed; top:0; right:0; z-index:200; padding:36px 48px 0 0; display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
#nav a { font-family:'Epilogue',sans-serif; font-weight:700; font-size:15px; color:var(--black); text-decoration:none; line-height:1.6; transition:opacity 0.2s; }
#nav a:hover { opacity:0.4; }

/* LOGO */
.logo-wrap { position:fixed; top:36px; left:48px; z-index:200; display:flex; flex-direction:column; gap:2px; text-decoration:none; color:var(--black); }
.logo-mark { display:flex; align-items:flex-end; gap:7px; }
.logo-bars { display:flex; gap:4px; align-items:flex-end; padding-bottom:3px; }
.logo-bars b { display:block; width:7px; background:var(--black); }
.logo-bars b:nth-child(1) { height:14px; }
.logo-bars b:nth-child(2) { height:26px; }
.logo-bars b:nth-child(3) { height:20px; }
.logo-text { font-family:'Epilogue',sans-serif; font-weight:700; font-size:20px; line-height:1; letter-spacing:-0.01em; }
.logo-sub  { font-family:'Epilogue',sans-serif; font-size:9px; font-weight:500; letter-spacing:4px; text-transform:uppercase; color:var(--mid); padding-left:30px; }

/* BACK LINK */
.back-link { display:inline-flex; align-items:center; gap:10px; text-decoration:none; color:var(--mid); font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; padding:160px 60px 0; transition:color 0.2s; }
.back-link:hover { color:var(--black); }
.back-link svg { transition:transform 0.2s; }
.back-link:hover svg { transform:translateX(-3px); }

/* MAIN LAYOUT */
.detail-wrap { display:grid; grid-template-columns:1fr 1fr; min-height:85vh; border-top:1px solid var(--black); margin-top:28px; }

/* LEFT — CAROUSEL */
.carousel-col { border-right:1px solid var(--rule); position:relative; background:#0d0d0d; }
.carousel-track { width:100%; height:100%; min-height:600px; position:relative; overflow:hidden; }
.carousel-slide { position:absolute; inset:0; opacity:0; transition:opacity 0.6s ease; }
.carousel-slide.active { opacity:1; }
.carousel-slide img { width:100%; height:100%; object-fit:contain; display:block; }
.carousel-slide .no-img { width:100%; height:100%; min-height:600px; background:linear-gradient(155deg,#282018 0%,#483c2c 55%,#181210 100%); }

/* ARROWS */
.carousel-arrow { position:absolute; top:50%; transform:translateY(-50%); z-index:10; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15); color:#fff; width:44px; height:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:background 0.2s; backdrop-filter:blur(4px); }
.carousel-arrow:hover { background:rgba(255,255,255,0.18); }
.carousel-arrow.prev { left:20px; }
.carousel-arrow.next { right:20px; }
.carousel-arrow svg { width:16px; height:16px; }

/* DOTS */
.carousel-dots { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); display:flex; gap:8px; z-index:10; }
.dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.3); cursor:pointer; transition:background 0.2s, transform 0.2s; border:none; }
.dot.active { background:#fff; transform:scale(1.25); }

/* IMAGE COUNTER */
.img-counter { position:absolute; top:20px; right:20px; font-size:10px; font-weight:700; letter-spacing:2px; color:rgba(255,255,255,0.35); z-index:10; }

/* RIGHT — INFO */
.info-col { padding:60px 64px; display:flex; flex-direction:column; justify-content:center; }
.info-cat { font-size:9px; font-weight:700; letter-spacing:4px; text-transform:uppercase; color:var(--mid); margin-bottom:20px; }
.info-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(48px,5.5vw,80px); line-height:0.9; letter-spacing:0.02em; margin-bottom:40px; }

.spec-block { margin-bottom:36px; }
.spec-row { display:flex; justify-content:space-between; align-items:baseline; padding:10px 0; border-bottom:1px solid var(--rule); }
.spec-row:first-child { border-top:1px solid var(--rule); }
.spec-label { font-size:9px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--mid); }
.spec-value { font-size:13px; font-weight:500; color:var(--black); text-align:right; }

.tags { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:36px; }
.tag { font-size:9px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; padding:7px 14px; border:1px solid var(--rule); color:var(--mid); }

.info-desc { font-size:14px; line-height:1.75; color:#555; margin-bottom:32px; max-width:420px; }

.enquire-btn { display:inline-block; background:var(--black); color:var(--white); font-family:'Epilogue',sans-serif; font-size:10px; font-weight:700; letter-spacing:4px; text-transform:uppercase; text-decoration:none; padding:18px 36px; align-self:flex-start; transition:background 0.2s, color 0.2s; border:1px solid var(--black); cursor:pointer; }
.enquire-btn:hover { background:var(--white); color:var(--black); }

/* REVEAL */
.reveal { opacity:0; transform:translateY(18px); transition:opacity 0.65s ease, transform 0.65s ease; }
.reveal.in { opacity:1; transform:none; }
.d1 { transition-delay:0.1s; }
.d2 { transition-delay:0.18s; }
.d3 { transition-delay:0.26s; }
.d4 { transition-delay:0.34s; }

/* FOOTER */
footer { border-top:1px solid var(--black); padding:0 60px; margin-top:0; }
.footer-top { display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:40px; padding:52px 0 48px; border-bottom:1px solid var(--rule); }
.footer-logo-mark { display:flex; align-items:flex-end; gap:7px; margin-bottom:4px; }
.footer-logo-text { font-family:'Epilogue',sans-serif; font-weight:700; font-size:20px; line-height:1; letter-spacing:-0.01em; }
.footer-logo-sub { font-size:9px; font-weight:500; letter-spacing:4px; text-transform:uppercase; padding-left:30px; margin-bottom:20px; color:var(--mid); }
.footer-tagline { font-size:13px; color:var(--mid); line-height:1.6; max-width:200px; }
.footer-col-label { display:block; font-size:9px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--mid); margin-bottom:18px; }
.footer-nav, .footer-contact, .footer-social { display:flex; flex-direction:column; }
.footer-nav a, .footer-contact a, .footer-social a { font-size:14px; color:var(--black); text-decoration:none; line-height:2; transition:opacity 0.2s; }
.footer-nav a:hover, .footer-contact a:hover, .footer-social a:hover { opacity:0.4; }
.footer-bottom { display:flex; justify-content:space-between; padding:20px 0; }
.footer-copy { font-size:11px; color:var(--mid); letter-spacing:0.5px; }

/* RESPONSIVE */
@media (max-width:900px) {
  .detail-wrap { grid-template-columns:1fr; }
  .carousel-col { border-right:none; border-bottom:1px solid var(--rule); }
  .carousel-track { min-height:420px; }
  .info-col { padding:40px 24px; }
  .back-link { padding:140px 24px 0; }
  #nav { padding:24px 24px 0 0; }
  .logo-wrap { left:24px; top:24px; }
  footer { padding:0 24px; }
  .footer-top { grid-template-columns:1fr 1fr; gap:32px; }
}

/* LOADING STATE */
.loading { display:flex; align-items:center; justify-content:center; height:100vh; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--mid); }
/* SVG logo */
.logo-svg { height: 24px; width: 59px; display: block; }
.footer-logo-svg { height: 24px; width: auto; display: block; margin-bottom: 2px; }

  // ── Carousel logic ────────────────────────────────────
  const slides = document.querySelectorAll('.carousel-slide');
  const dots   = document.querySelectorAll('.dot');
  const counter = qs('.img-counter');
  let cur = 0, timer = null;

  function goTo(n){
    slides[cur].classList.remove('active');
    dots[cur] && dots[cur].classList.remove('active');
    cur = (n + slides.length) % slides.length;
    slides[cur].classList.add('active');
    dots[cur] && dots[cur].classList.add('active');
    if(counter) counter.textContent = String(cur+1).padStart(2,'0') + ' / ' + String(slides.length).padStart(2,'0');
    resetTimer();
  }

  function resetTimer(){ clearInterval(timer); if(slides.length>1) timer = setInterval(()=>goTo(cur+1), 4500); }

  qs('.carousel-arrow.prev') && qs('.carousel-arrow.prev').addEventListener('click', ()=>goTo(cur-1));
  qs('.carousel-arrow.next') && qs('.carousel-arrow.next').addEventListener('click', ()=>goTo(cur+1));
  dots.forEach(d => d.addEventListener('click', ()=>goTo(+d.dataset.idx)));

  // Touch swipe
  let tx=0;
  const track = qs('#track');
  track.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; }, {passive:true});
  track.addEventListener('touchend',   e=>{ const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>40) goTo(cur+(dx<0?1:-1)); }, {passive:true});

  resetTimer();

  // ── Reveal on scroll ─────────────────────────────────
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold:0.05 });
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

  // ── Smooth scroll ─────────────────────────────────────
  let targetY = window.scrollY, rafId = null;
  window.addEventListener('wheel', function(e){
    e.preventDefault();
    targetY = Math.max(0, Math.min(targetY + e.deltaY * 0.82, document.body.scrollHeight - window.innerHeight));
    if(!rafId) tick();
  }, { passive:false });
  function tick(){
    const curr=window.scrollY, diff=targetY-curr;
    if(Math.abs(diff)<0.5){ window.scrollTo(0,targetY); rafId=null; return; }
    window.scrollTo(0, curr+diff*0.14);
    rafId=requestAnimationFrame(tick);
  }
}
